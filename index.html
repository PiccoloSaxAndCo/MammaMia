<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia Player</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
}

button {
    font-size: 16px;
    padding: 10px;
}

.track {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    margin: 10px 0;
}

.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
}

label {
    font-weight: bold;
    width: 90px;
}

input[type=range] {
    flex: 1;
    margin: 0 10px;
}

.smallbtn {
    padding: 5px 8px;
    font-size: 12px;
}

#seek {
    width: 100%;
}
</style>
</head>

<body>

<h1>Mamma Mia Player</h1>

<div class="controls">
    <button id="play">▶ Play</button>
    <button id="pause">⏸ Pause</button>
    <button id="stop">■ Stop</button>
</div>

<input type="range" id="seek" min="0" max="1000" value="0">

<div id="tracks"></div>

<script>
const names = {
    ref: "Referenz",
    sop: "Sopran",
    alt: "Alt",
    ten: "Tenor",
    bas: "Bass"
};

const files = {
    ref: "referenz.mp3",
    sop: "sopran.mp3",
    alt: "alt.mp3",
    ten: "tenor.mp3",
    bas: "bass.mp3"
};

const audios = {};
const gain = {};
const muted = {};
const solo = {};

const container = document.getElementById("tracks");

// create audio + UI
for (let key in files) {
    const a = new Audio(files[key]);
    a.preload = "auto";
    audios[key] = a;

    gain[key] = localStorage.getItem("vol_"+key) ?? 0.8;
    muted[key] = false;
    solo[key] = false;

    const div = document.createElement("div");
    div.className = "track";

    div.innerHTML = `
        <div class="row">
            <label>${names[key]}</label>

            <input type="range" min="0" max="1" step="0.01" value="${gain[key]}" id="vol_${key}">

            <button class="smallbtn" id="mute_${key}">Mute</button>
            <button class="smallbtn" id="solo_${key}">Solo</button>
        </div>
    `;

    container.appendChild(div);

    div.querySelector(`#vol_${key}`).oninput = e => {
        gain[key] = e.target.value;
        localStorage.setItem("vol_"+key, gain[key]);
        applyVolume();
    };

    div.querySelector(`#mute_${key}`).onclick = () => {
        muted[key] = !muted[key];
        applyVolume();
    };

    div.querySelector(`#solo_${key}`).onclick = () => {
        solo[key] = !solo[key];
        applyVolume();
    };
}

function applyVolume() {
    const anySolo = Object.values(solo).some(v => v);

    for (let k in audios) {
        let v = gain[k];

        if (muted[k]) v = 0;

        if (anySolo && !solo[k]) v = 0;

        audios[k].volume = v;
    }
}

// sync play
function playAll() {
    const t = audios.ref.currentTime || 0;

    for (let k in audios) {
        audios[k].currentTime = t;
        audios[k].play();
    }
}

// pause
function pauseAll() {
    for (let k in audios) {
        audios[k].pause();
    }
}

// stop
function stopAll() {
    for (let k in audios) {
        audios[k].pause();
        audios[k].currentTime = 0;
    }
}

document.getElementById("play").onclick = playAll;
document.getElementById("pause").onclick = pauseAll;
document.getElementById("stop").onclick = stopAll;

// seek bar
const seek = document.getElementById("seek");

setInterval(() => {
    seek.value = audios.ref.currentTime || 0;
}, 200);

seek.oninput = () => {
    const t = seek.value;
    for (let k in audios) {
        audios[k].currentTime = t;
    }
};

// init volume
applyVolume();
</script>

</body>
</html>
