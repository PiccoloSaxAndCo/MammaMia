<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World Scroll Test</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:800px;
  margin:auto;
  padding:20px;
}

button{
  padding:10px 20px;
  font-size:16px;
}

#lyricsBox{
  margin-top:20px;
  height:250px;
  border:1px solid #ccc;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  background:#fafafa;
}

#lyricsContent{
  position:absolute;
  width:100%;
  padding:20px;
  box-sizing:border-box;
  font-size:28px;
  line-height:2;
  text-align:center;
  white-space:pre-line;
}

#time{
  margin-top:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<h1>Hello World Test</h1>

<button id="play">▶ Play</button>

<div id="time">0:00 / 0:00</div>

<div id="lyricsBox">
  <div id="lyricsContent">

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

Hello world

  </div>
</div>

<script>

const ctx = new (window.AudioContext || window.webkitAudioContext)();

let buffer;
let source;

let duration = 0;
let startTime = 0;
let playing = false;

async function loadAudio() {

  const res = await fetch("audio.mp3");
  const arr = await res.arrayBuffer();

  buffer = await ctx.decodeAudioData(arr);

  duration = buffer.duration;
}

function playAudio() {

  source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);

  startTime = ctx.currentTime;

  source.start();

  playing = true;

  updateUI();
}

function format(t){

  const m = Math.floor(t/60);

  const s = Math.floor(t%60)
    .toString()
    .padStart(2,"0");

  return `${m}:${s}`;
}

function updateLyrics(t){

  const box =
    document.getElementById("lyricsBox");

  const content =
    document.getElementById("lyricsContent");

  const maxScroll =
    content.scrollHeight - box.clientHeight;

  const progress =
    Math.min(t / duration, 1);

  content.style.top =
    -(maxScroll * progress) + "px";
}

function updateUI(){

  if(!playing) return;

  const t =
    ctx.currentTime - startTime;

  document.getElementById("time").innerText =
    format(t) + " / " + format(duration);

  updateLyrics(t);

  if(t < duration){
    requestAnimationFrame(updateUI);
  }
}

document.getElementById("play").onclick =
async () => {

  await ctx.resume();

  if(!buffer){
    await loadAudio();
  }

  playAudio();
};

</script>

</body>
</html>
